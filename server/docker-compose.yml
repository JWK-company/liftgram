services:
  db:
    image: postgres:16-alpine
    container_name: repset-db
    environment:
      POSTGRES_USER: repset
      POSTGRES_PASSWORD: repset
      POSTGRES_DB: repset
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repset"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
